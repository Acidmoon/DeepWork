<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Workbench Render Validation</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        padding: 24mm 18mm;
        color: #1f2937;
        background: linear-gradient(180deg, #f8fafc, #ffffff);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      p {
        font-size: 14px;
        line-height: 1.6;
      }
      .card {
        margin-top: 16px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 16px;
        background: white;
      }
    </style>
  </head>
  <body>
    <h1>AI Workbench PDF Validation</h1>
    <p>This file verifies that local HTML can be rendered into a PDF artifact.</p>
    <div class="card">
      <strong>Status:</strong> If this page becomes a PDF, the renderer path works.
    </div>
  </body>
</html>
